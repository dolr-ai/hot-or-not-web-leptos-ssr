name: deploy preview
on:
  pull_request:
    types: [opened, reopened, synchronize, closed, labeled, unlabeled]

permissions:
  deployments: write
  pull-requests: read
  id-token: write   
  contents: read

env:
  FLY_API_TOKEN: ${{ secrets.HOT_OR_NOT_WEB_LEPTOS_SSR_FLY_IO_GITHUB_ACTION }}
  FLY_ORG: gobazzinga-inc-584

jobs:
  build_check:
    uses: ./.github/workflows/build-check.yml
    with:
      publish-artifact: true
      erase_components: ${{ contains(github.event.pull_request.labels.*.name, 'type erasured') }}
    secrets: inherit


  destroy_preview:
    if: ${{github.event.pull_request.state == 'closed'}}
    runs-on: ubuntu-latest
    environment:
      name: pr-${{ github.event.number }}
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Deploy
        id: destroy
        uses: superfly/fly-pr-review-apps@1.2.1

  preview:
    if: ${{ github.event.pull_request.state == 'open'}}
    needs: build_check
    runs-on: ubuntu-latest

    # Only run one deployment at a time per PR.
    concurrency:
      group: pr-${{ github.event.number }}

    # Create a GitHub deployment environment per staging app so it shows up
    # in the pull request UI.
    environment:
      name: pr-${{ github.event.number }}
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v3
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-musl
      - run: chmod +x target/x86_64-unknown-linux-musl/prod-release/hot-or-not-web-leptos-ssr

      - name: Get branch name
        id: branch-names
        uses: tj-actions/branch-names@v8

      - name: Deploy
        id: deploy
        uses: superfly/fly-pr-review-apps@1.5.0

      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.yral.com
          method: jwt
          role: hot-or-not-web-leptos-ssr-role
          jwtGithubAudience: "https://github.com/dolr-ai"
          secrets: |
            secret/data/hot-or-not-web-leptos-ssr/config cf_token | CF_TOKEN ;
            secret/data/hot-or-not-web-leptos-ssr/config backend_admin_identity | BACKEND_ADMIN_IDENTITY ;
            secret/data/hot-or-not-web-leptos-ssr/config cookie_key | COOKIE_KEY ;
            secret/data/hot-or-not-web-leptos-ssr/config grpc_auth_token | GRPC_AUTH_TOKEN ;
            secret/data/hot-or-not-web-leptos-ssr/config hon_google_service_account | HON_GOOGLE_SERVICE_ACCOUNT ;
            secret/data/hot-or-not-web-leptos-ssr/config qstash_token | QSTASH_TOKEN ;
            secret/data/hot-or-not-web-leptos-ssr/config ga4_api_secret | GA4_API_SECRET ;
            secret/data/hot-or-not-web-leptos-ssr/config nsfw_grpc_token | NSFW_GRPC_TOKEN ;
            secret/data/hot-or-not-web-leptos-ssr/config alloydb_instance | ALLOYDB_INSTANCE ;
            secret/data/hot-or-not-web-leptos-ssr/config alloydb_db_password | ALLOYDB_DB_PASSWORD ;
            secret/data/hot-or-not-web-leptos-ssr/config alloydb_service_account_json | ALLOYDB_SERVICE_ACCOUNT_JSON ;
            secret/data/hot-or-not-web-leptos-ssr/config hon_worker_jwt | HON_WORKER_JWT ;
            secret/data/hot-or-not-web-leptos-ssr/config yral_auth_client_secret | YRAL_AUTH_CLIENT_SECRET ;
            secret/data/hot-or-not-web-leptos-ssr/config analytics_server_token | ANALYTICS_SERVER_TOKEN ;
            secret/data/hot-or-not-web-leptos-ssr/config yral_auth_migration_es256_pem | YRAL_AUTH_MIGRATION_ES256_PEM ;
            secret/data/hot-or-not-web-leptos-ssr/config yral_metadata_notification_api_key | YRAL_METADATA_NOTIFICATION_API_KEY ;
            secret/data/hot-or-not-web-leptos-ssr/config otlp_endpoint | OTLP_ENDPOINT ;
            secret/data/hot-or-not-web-leptos-ssr/config dragonfly_password | DRAGONFLY_PASSWORD ;
            secret/data/hot-or-not-web-leptos-ssr/config dragonfly_hosts | DRAGONFLY_HOSTS ;
            secret/data/hot-or-not-web-leptos-ssr/config dragonfly_ca_cert | DRAGONFLY_CA_CERT ;
            secret/data/hot-or-not-web-leptos-ssr/config dragonfly_client_cert | DRAGONFLY_CLIENT_CERT ;
            secret/data/hot-or-not-web-leptos-ssr/config dragonfly_client_key | DRAGONFLY_CLIENT_KEY ;

      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Set secret tokens
        run: |
          APP_NAME="pr-${{github.event.number}}-${{github.repository_owner}}-hot-or-not-web-leptos-ssr"
          flyctl secrets set CF_TOKEN="$CF_TOKEN" --app "$APP_NAME" --stage
          flyctl secrets set BACKEND_ADMIN_IDENTITY="$BACKEND_ADMIN_IDENTITY" --app "$APP_NAME" --stage
          flyctl secrets set COOKIE_KEY="$COOKIE_KEY" --app "$APP_NAME" --stage
          flyctl secrets set GRPC_AUTH_TOKEN="$GRPC_AUTH_TOKEN" --app "$APP_NAME" --stage
          flyctl secrets set "HON_GOOGLE_SERVICE_ACCOUNT=$HON_GOOGLE_SERVICE_ACCOUNT" --app "$APP_NAME" --stage
          flyctl secrets set QSTASH_TOKEN="$QSTASH_TOKEN" --app "$APP_NAME" --stage
          flyctl secrets set GA4_API_SECRET="$GA4_API_SECRET" --app "$APP_NAME" --stage
          flyctl secrets set NSFW_GRPC_TOKEN="$NSFW_GRPC_TOKEN" --app "$APP_NAME" --stage
          flyctl secrets set ALLOYDB_INSTANCE="$ALLOYDB_INSTANCE" --app "$APP_NAME" --stage
          flyctl secrets set ALLOYDB_DB_PASSWORD="$ALLOYDB_DB_PASSWORD" --app "$APP_NAME" --stage
          flyctl secrets set ALLOYDB_SERVICE_ACCOUNT_JSON="$ALLOYDB_SERVICE_ACCOUNT_JSON" --app "$APP_NAME" --stage
          flyctl secrets set HON_WORKER_JWT="$HON_WORKER_JWT" --app "$APP_NAME" --stage
          flyctl secrets set YRAL_AUTH_CLIENT_SECRET="$YRAL_AUTH_CLIENT_SECRET" --app "$APP_NAME" --stage
          flyctl secrets set YRAL_AUTH_REDIRECT_URL="https://$APP_NAME.fly.dev/auth/google_redirect" --app "$APP_NAME" --stage
          flyctl secrets set ANALYTICS_SERVER_TOKEN="$ANALYTICS_SERVER_TOKEN" --app "$APP_NAME" --stage
          flyctl secrets set YRAL_AUTH_MIGRATION_ES256_PEM="$YRAL_AUTH_MIGRATION_ES256_PEM" --app "$APP_NAME" --stage
          flyctl secrets set YRAL_METADATA_NOTIFICATION_API_KEY="$YRAL_METADATA_NOTIFICATION_API_KEY" --app "$APP_NAME" --stage
          flyctl secrets set OTLP_ENDPOINT="$OTLP_ENDPOINT" --app "$APP_NAME" --stage
          flyctl secrets set DRAGONFLY_PASSWORD="$DRAGONFLY_PASSWORD" --app "$APP_NAME" --stage
          flyctl secrets set DRAGONFLY_HOSTS="$DRAGONFLY_HOSTS" --app "$APP_NAME" --stage
          printf '%s' "$DRAGONFLY_CA_CERT" | flyctl secrets set DRAGONFLY_CA_CERT=- --app "$APP_NAME" --stage
          printf '%s' "$DRAGONFLY_CLIENT_CERT" | flyctl secrets set DRAGONFLY_CLIENT_CERT=- --app "$APP_NAME" --stage
          printf '%s' "$DRAGONFLY_CLIENT_KEY" | flyctl secrets set DRAGONFLY_CLIENT_KEY=- --app "$APP_NAME" --stage
          flyctl deploy --app $APP_NAME
        env:
          FLY_API_TOKEN: ${{ secrets.HOT_OR_NOT_WEB_LEPTOS_SSR_FLY_IO_GITHUB_ACTION }}
          CF_TOKEN: ${{ env.CF_TOKEN }}}
          BACKEND_ADMIN_IDENTITY: ${{ env.BACKEND_ADMIN_IDENTITY }}
          COOKIE_KEY: ${{ env.COOKIE_KEY }}
          GRPC_AUTH_TOKEN: ${{ env.GRPC_AUTH_TOKEN }}
          HON_GOOGLE_SERVICE_ACCOUNT: ${{ env.HON_GOOGLE_SERVICE_ACCOUNT }}
          QSTASH_TOKEN: ${{ env.QSTASH_TOKEN }}
          GA4_API_SECRET: ${{ env.GA4_API_SECRET }}
          NSFW_GRPC_TOKEN: ${{ env.NSFW_GRPC_TOKEN }}
          ALLOYDB_INSTANCE: ${{ env.ALLOYDB_INSTANCE }}
          ALLOYDB_DB_PASSWORD: ${{ env.ALLOYDB_DB_PASSWORD }}
          ALLOYDB_SERVICE_ACCOUNT_JSON: ${{ env.ALLOYDB_SERVICE_ACCOUNT_JSON }}
          HON_WORKER_JWT: ${{ env.HON_WORKER_JWT }}
          YRAL_AUTH_CLIENT_SECRET: ${{ env.YRAL_AUTH_CLIENT_SECRET }}
          ANALYTICS_SERVER_TOKEN: ${{ env.ANALYTICS_SERVER_TOKEN }}
          YRAL_AUTH_MIGRATION_ES256_PEM: ${{ env.YRAL_AUTH_MIGRATION_ES256_PEM }}
          YRAL_METADATA_NOTIFICATION_API_KEY: ${{ env.YRAL_METADATA_NOTIFICATION_API_KEY }}
          OTLP_ENDPOINT: ${{ env.OTLP_ENDPOINT }}
          DRAGONFLY_PASSWORD: ${{ env.DRAGONFLY_PASSWORD }}
          DRAGONFLY_HOSTS: ${{ env.DRAGONFLY_HOSTS }}
          DRAGONFLY_CA_CERT: ${{ env.DRAGONFLY_CA_CERT }}
          DRAGONFLY_CLIENT_CERT: ${{ env.DRAGONFLY_CLIENT_CERT }}
          DRAGONFLY_CLIENT_KEY: ${{ env.DRAGONFLY_CLIENT_KEY }}
  e2e-tests:
    needs: preview
    uses: ./.github/workflows/e2e-tests.yml
    if: ${{ github.event.pull_request.state == 'open'}}
    secrets: inherit
    with:
      preview_url: https://pr-${{github.event.number}}-${{github.repository_owner}}-hot-or-not-web-leptos-ssr.fly.dev
      build_name: PR-${{github.event.number}}-commit-${{github.sha}}-attempt-${{github.run_attempt}}
