# .github/workflows/deploy-preview.yml

name: deploy preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed, labeled, unlabeled]

permissions:
  pull-requests: write
  deployments: write
  packages: write

jobs:
  build_check:
    uses: ./.github/workflows/build-check.yml
    with:
      publish-artifact: true
    secrets: inherit

  preview:
    if: ${{ github.event.pull_request.state == 'open' }}
    needs: build_check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    concurrency:
      group: pr-${{ github.event.number }}-${{ github.event.repository.name }}
      cancel-in-progress: true

    environment:
      name: pr-${{ github.event.number }}
      url: ${{ steps.meta.outputs.preview_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute Preview Metadata
        id: meta
        run: |
          PR_NUMBER=${{ github.event.number }}
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g')
          IMAGE="ghcr.io/${{ github.repository_owner }}/${REPO_NAME}"
          IMAGE_TAG="pr-${PR_NUMBER}"
          PREVIEW_DOMAIN="pr-${PR_NUMBER}-${REPO_NAME}.preview.yral.com"
          PREVIEW_URL="https://${PREVIEW_DOMAIN}"
          APP_NAME="pr-${PR_NUMBER}-${REPO_NAME}"

          echo "pr_number=${PR_NUMBER}"             >> $GITHUB_OUTPUT
          echo "repo_name=${REPO_NAME}"             >> $GITHUB_OUTPUT
          echo "image=${IMAGE}"                     >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}"             >> $GITHUB_OUTPUT
          echo "preview_domain=${PREVIEW_DOMAIN}"   >> $GITHUB_OUTPUT
          echo "preview_url=${PREVIEW_URL}"         >> $GITHUB_OUTPUT
          echo "app_name=${APP_NAME}"               >> $GITHUB_OUTPUT

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-musl

      - name: Fix Binary Permissions
        run: chmod +x target/x86_64-unknown-linux-musl/prod-release/hot-or-not-web-leptos-ssr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # runner pushes using GITHUB_TOKEN

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.preview
          push: true
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:cache-${{ steps.meta.outputs.image_tag }}
          cache-to: type=registry,ref=${{ steps.meta.outputs.image }}:cache-${{ steps.meta.outputs.image_tag }},mode=max

      - name: Create or Get Coolify Application for PR
        id: coolify_app
        run: |
          APP_NAME="${{ steps.meta.outputs.app_name }}"
          IMAGE="${{ steps.meta.outputs.image }}"
          IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"
          PREVIEW_DOMAIN="${{ steps.meta.outputs.preview_domain }}"

          # Check if app already exists for this PR (e.g. new commit pushed to same PR)
          EXISTING=$(curl -s \
            "${{ secrets.COOLIFY_URL }}/api/v1/applications" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            | jq -r --arg name "$APP_NAME" '.[] | select(.name == $name) | .uuid // empty')

          if [ -n "$EXISTING" ]; then
            echo "Reusing existing Coolify app: $EXISTING"
            echo "app_uuid=${EXISTING}" >> $GITHUB_OUTPUT
          else
            echo "Creating new Coolify app: $APP_NAME"

            RESPONSE=$(curl -s -X POST \
              "${{ secrets.COOLIFY_URL }}/api/v1/applications/dockerimage" \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"name\": \"${APP_NAME}\",
                \"project_uuid\": \"${{ secrets.COOLIFY_PROJECT_UUID }}\",
                \"server_uuid\": \"${{ secrets.COOLIFY_SERVER_UUID }}\",
                \"environment_name\": \"preview\",
                \"environment_uuid\": \"${{ secrets.COOLIFY_ENV_UUID }}\",
                \"docker_registry_image_name\": \"${IMAGE}\",
                \"docker_registry_image_tag\": \"${IMAGE_TAG}\",
                \"domains\": \"https://${PREVIEW_DOMAIN}\",
                \"ports_exposes\": \"8080\",
                \"is_static\": false
              }")

            echo "Create response: $RESPONSE"

            APP_UUID=$(echo $RESPONSE | jq -r '.uuid // empty')

            if [ -z "$APP_UUID" ]; then
              echo "Failed to create Coolify application"
              echo "$RESPONSE"
              exit 1
            fi

            echo "app_uuid=${APP_UUID}" >> $GITHUB_OUTPUT
          fi

      - name: Push Environment Variables to Coolify
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_STREAM_IMAGES_ANALYTICS_READ_WRITE_SECRET }}
          BACKEND_ADMIN_IDENTITY: ${{ secrets.YRAL_DAPP_BACKEND_APP_ADMIN_AND_PROPOSAL_SUBMITTER_IDENTITY_PRIVATE_KEY }}
          COOKIE_KEY: ${{ secrets.AUTH_SESSION_COOKIE_SIGNING_SECRET_KEY }}
          GRPC_AUTH_TOKEN: ${{ secrets.OFF_CHAIN_AGENT_GRPC_AUTH_TOKEN }}
          HON_GOOGLE_SERVICE_ACCOUNT: ${{ secrets.HOT_OR_NOT_FEED_INTELLIGENCE_FIREBASE_PROJECT_EVENTS_BQ_SERVICE_ACCOUNT_JSON_FOR_WEB_LEPTOS_SSR_APP }}
          QSTASH_TOKEN: ${{ secrets.QSTASH_TOKEN }}
          GA4_API_SECRET: ${{ secrets.GOOGLE_ANALYTICS_MEASUREMENT_PROTOCOL_API_SECRET }}
          NSFW_GRPC_TOKEN: ${{ secrets.TOKEN_TO_SIGN_OUTGOING_CALLS_TO_NSFW_DETECT_SERVICE }}
          ALLOYDB_INSTANCE: ${{ secrets.HOT_OR_NOT_ALLOYDB_INSTANCE }}
          ALLOYDB_DB_PASSWORD: ${{ secrets.HOT_OR_NOT_ALLOYDB_DB_PASSWORD }}
          ALLOYDB_SERVICE_ACCOUNT_JSON: ${{ secrets.HOT_OR_NOT_ALLOYDB_SERVICE_ACCOUNT }}
          HON_WORKER_JWT: ${{ secrets.HOT_OR_NOT_WORKER_JWT }}
          YRAL_AUTH_CLIENT_SECRET: ${{ secrets.YRAL_AUTH_V2_PREVIEW_SECRET_KEY }}
          ANALYTICS_SERVER_TOKEN: ${{ secrets.ANALYTICS_SERVER_TOKEN }}
          YRAL_AUTH_MIGRATION_ES256_PEM: ${{ secrets.AUTH_JWT_ES256_SIGNING_SECRET_KEY_PEM }}
          YRAL_METADATA_NOTIFICATION_API_KEY: ${{ secrets.YRAL_METADATA_NOTIFICATION_API_KEY }}
          OTLP_ENDPOINT: ${{ secrets.OTLP_ENDPOINT }}
          DRAGONFLY_PASSWORD: ${{ secrets.DRAGONFLY_PASSWORD }}
          DRAGONFLY_HOSTS: ${{ vars.DRAGONFLY_HOSTS }}
          DRAGONFLY_CA_CERT: ${{ secrets.DRAGONFLY_CA_CERT }}
          DRAGONFLY_CLIENT_CERT: ${{ secrets.DRAGONFLY_CLIENT_CERT }}
          DRAGONFLY_CLIENT_KEY: ${{ secrets.DRAGONFLY_CLIENT_KEY }}
          APP_URL: ${{ steps.meta.outputs.preview_url }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          YRAL_AUTH_REDIRECT_URL: "${{ steps.meta.outputs.preview_url }}/auth/google_redirect"
        run: |
          APP_UUID="${{ steps.coolify_app.outputs.app_uuid }}"
          flatten() { echo "$1" | tr -d '\n\r'; }

          ENV_JSON=$(jq -n \
            --arg cf_token                           "$CF_TOKEN" \
            --arg backend_admin_identity             "$BACKEND_ADMIN_IDENTITY" \
            --arg cookie_key                         "$COOKIE_KEY" \
            --arg grpc_auth_token                    "$GRPC_AUTH_TOKEN" \
            --arg hon_google_service_account         "$(flatten "$HON_GOOGLE_SERVICE_ACCOUNT")" \
            --arg qstash_token                       "$QSTASH_TOKEN" \
            --arg ga4_api_secret                     "$GA4_API_SECRET" \
            --arg nsfw_grpc_token                    "$NSFW_GRPC_TOKEN" \
            --arg alloydb_instance                   "$ALLOYDB_INSTANCE" \
            --arg alloydb_db_password                "$ALLOYDB_DB_PASSWORD" \
            --arg alloydb_service_account_json       "$(flatten "$ALLOYDB_SERVICE_ACCOUNT_JSON")" \
            --arg hon_worker_jwt                     "$HON_WORKER_JWT" \
            --arg yral_auth_client_secret            "$YRAL_AUTH_CLIENT_SECRET" \
            --arg analytics_server_token             "$ANALYTICS_SERVER_TOKEN" \
            --arg yral_auth_migration_es256_pem      "$YRAL_AUTH_MIGRATION_ES256_PEM" \
            --arg yral_metadata_notification_api_key "$YRAL_METADATA_NOTIFICATION_API_KEY" \
            --arg otlp_endpoint                      "$OTLP_ENDPOINT" \
            --arg dragonfly_password                 "$DRAGONFLY_PASSWORD" \
            --arg dragonfly_hosts                    "$DRAGONFLY_HOSTS" \
            --arg dragonfly_ca_cert                  "$DRAGONFLY_CA_CERT" \
            --arg dragonfly_client_cert              "$DRAGONFLY_CLIENT_CERT" \
            --arg dragonfly_client_key               "$DRAGONFLY_CLIENT_KEY" \
            --arg app_url                            "$APP_URL" \
            --arg pr_number                          "$PR_NUMBER" \
            --arg yral_auth_redirect_url             "$YRAL_AUTH_REDIRECT_URL" \
            '[
              {"key": "CF_TOKEN",                           "value": $cf_token, "is_literal": true},
              {"key": "BACKEND_ADMIN_IDENTITY",             "value": $backend_admin_identity, "is_literal": true},
              {"key": "COOKIE_KEY",                         "value": $cookie_key, "is_literal": true},
              {"key": "GRPC_AUTH_TOKEN",                    "value": $grpc_auth_token, "is_literal": true},
              {"key": "HON_GOOGLE_SERVICE_ACCOUNT",         "value": $hon_google_service_account, "is_literal": true},
              {"key": "QSTASH_TOKEN",                       "value": $qstash_token, "is_literal": true},
              {"key": "GA4_API_SECRET",                     "value": $ga4_api_secret, "is_literal": true},
              {"key": "NSFW_GRPC_TOKEN",                    "value": $nsfw_grpc_token, "is_literal": true},
              {"key": "ALLOYDB_INSTANCE",                   "value": $alloydb_instance, "is_literal": true},
              {"key": "ALLOYDB_DB_PASSWORD",                "value": $alloydb_db_password, "is_literal": true},
              {"key": "ALLOYDB_SERVICE_ACCOUNT_JSON",       "value": $alloydb_service_account_json, "is_literal": true},
              {"key": "HON_WORKER_JWT",                     "value": $hon_worker_jwt, "is_literal": true},
              {"key": "YRAL_AUTH_CLIENT_SECRET",            "value": $yral_auth_client_secret, "is_literal": true},
              {"key": "ANALYTICS_SERVER_TOKEN",             "value": $analytics_server_token, "is_literal": true},
              {"key": "YRAL_AUTH_MIGRATION_ES256_PEM",      "value": $yral_auth_migration_es256_pem, "is_literal": true},
              {"key": "YRAL_METADATA_NOTIFICATION_API_KEY", "value": $yral_metadata_notification_api_key, "is_literal": true},
              {"key": "OTLP_ENDPOINT",                      "value": $otlp_endpoint, "is_literal": true},
              {"key": "DRAGONFLY_PASSWORD",                 "value": $dragonfly_password, "is_literal": true},
              {"key": "DRAGONFLY_HOSTS",                    "value": $dragonfly_hosts, "is_literal": true},
              {"key": "DRAGONFLY_CA_CERT",                  "value": $dragonfly_ca_cert, "is_multiline": true},
              {"key": "DRAGONFLY_CLIENT_CERT",              "value": $dragonfly_client_cert, "is_multiline": true},
              {"key": "DRAGONFLY_CLIENT_KEY",               "value": $dragonfly_client_key, "is_multiline": true},
              {"key": "APP_URL",                            "value": $app_url, "is_literal": true},
              {"key": "PR_NUMBER",                          "value": $pr_number, "is_literal": true},
              {"key": "YRAL_AUTH_REDIRECT_URL",             "value": $yral_auth_redirect_url, "is_literal": true}
            ]')

          curl -s -X PATCH \
            "${{ secrets.COOLIFY_URL }}/api/v1/applications/${APP_UUID}/envs/bulk" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"data\": ${ENV_JSON}}"

      - name: Update Image Tag and Deploy
        id: deploy
        run: |
          APP_UUID="${{ steps.coolify_app.outputs.app_uuid }}"
          IMAGE="${{ steps.meta.outputs.image }}"
          IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"

          # Update image tag (important on subsequent pushes to same PR)
          curl -s -X PATCH \
            "${{ secrets.COOLIFY_URL }}/api/v1/applications/${APP_UUID}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"docker_registry_image_tag\": \"${IMAGE_TAG}\"}"

          # Trigger deploy
          RESPONSE=$(curl -s -X POST \
            "${{ secrets.COOLIFY_URL }}/api/v1/applications/${APP_UUID}/start" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"uuid\": \"${APP_UUID}\",
              \"force\": true
            }")

          echo "Deploy response: $RESPONSE"

          DEPLOY_UUID=$(echo $RESPONSE | jq -r '.deployment_uuid // empty')
          if [ -z "$DEPLOY_UUID" ]; then
            echo "Failed to trigger deployment"
            echo "$RESPONSE"
            exit 1
          fi

          echo "deploy_uuid=${DEPLOY_UUID}" >> $GITHUB_OUTPUT

      - name: Wait for Deployment
        run: |
          DEPLOY_UUID="${{ steps.deploy.outputs.deploy_uuid }}"
          MAX_WAIT=120
          WAITED=0

          while [ $WAITED -lt $MAX_WAIT ]; do
            STATUS=$(curl -s \
              "${{ secrets.COOLIFY_URL }}/api/v1/deployments/${DEPLOY_UUID}" \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
              | jq -r '.status // empty')

            echo "Status: ${STATUS} (${WAITED}s elapsed)"

            if [ "$STATUS" = "finished" ]; then exit 0
            elif [ "$STATUS" = "failed" ] || [ "$STATUS" = "error" ]; then exit 1
            fi

            sleep 10
            WAITED=$((WAITED + 10))
          done

          echo "Timed out"
          exit 1

  e2e-tests:
    needs: preview
    uses: ./.github/workflows/e2e-tests.yml
    if: ${{ github.event.pull_request.state == 'open' }}
    secrets: inherit
    with:
      preview_url: "https://pr-${{ github.event.number }}-${{ github.event.repository.name }}.preview.yral.com"
      build_name: "PR-${{ github.event.number }}-commit-${{ github.sha }}-attempt-${{ github.run_attempt }}"

  destroy-preview:
    if: ${{ github.event.pull_request.state == 'closed' }}
    runs-on: ubuntu-latest

    steps:
      - name: Compute Metadata
        id: meta
        run: |
          PR_NUMBER=${{ github.event.number }}
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g')
          APP_NAME="pr-${PR_NUMBER}-${REPO_NAME}"
          echo "app_name=${APP_NAME}"   >> $GITHUB_OUTPUT
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT

      - name: Find and Delete Coolify Application
        run: |
          APP_NAME="${{ steps.meta.outputs.app_name }}"

          APP_UUID=$(curl -s \
            "${{ secrets.COOLIFY_URL }}/api/v1/applications" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            | jq -r --arg name "$APP_NAME" '.[] | select(.name == $name) | .uuid // empty')

          if [ -z "$APP_UUID" ]; then
            echo "No app found for $APP_NAME — skipping"
            exit 0
          fi

          echo "Deleting Coolify app $APP_NAME ($APP_UUID)"

          curl -s -X DELETE \
            "${{ secrets.COOLIFY_URL }}/api/v1/applications/${APP_UUID}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"

      - name: Delete GHCR Image Tag
        run: |
          PR_NUMBER="${{ steps.meta.outputs.pr_number }}"
          REPO_NAME="${{ steps.meta.outputs.repo_name }}"
          IMAGE_TAG="pr-${PR_NUMBER}"

          VERSIONS=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/${REPO_NAME}/versions")

          VERSION_ID=$(echo $VERSIONS | jq -r --arg tag "$IMAGE_TAG" \
            '.[] | select(.metadata.container.tags[] == $tag) | .id // empty')

          if [ -n "$VERSION_ID" ]; then
            curl -s -X DELETE \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/${REPO_NAME}/versions/${VERSION_ID}"
            echo "Deleted GHCR image tag ${IMAGE_TAG}"
          else
            echo "Image tag not found, skipping"
          fi

      - name: Update PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ github.event.number }};
            const merged = ${{ github.event.pull_request.merged }};

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            for (const comment of comments.data) {
              if (comment.body.includes("<!-- coolify-preview -->")) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                  body: `<!-- coolify-preview -->
            ## Preview Deployment
            > ${merged ? "✅ PR merged — preview destroyed." : "🗑️ PR closed — preview destroyed."}`
                });
              }
            }