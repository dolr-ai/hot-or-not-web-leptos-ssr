name: Deploy to Bare Metal Servers

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-baremetal-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build_check:
    uses: ./.github/workflows/build-check-prod.yml
    with:
      publish-artifact: true
    secrets: inherit

  build-and-push:
    name: Build and Push Docker Images
    needs: build_check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-musl

      - name: Make binary executable
        run: chmod +x target/x86_64-unknown-linux-musl/prod-release/hot-or-not-web-leptos-ssr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for frontend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  prepare-servers:
    name: Prepare Server List
    runs-on: ubuntu-latest
    outputs:
      servers: ${{ steps.parse.outputs.servers }}
    steps:
      - name: Parse server IPs
        id: parse
        run: |
          # Convert comma-separated IPs to JSON array
          IPS="${{ vars.FRONTEND_BAREMETAL_SERVER_IPS }}"
          JSON=$(echo "$IPS" | tr ',' '\n' | jq -R . | jq -s -c .)
          echo "servers=$JSON" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to Server
    needs: [build-and-push, prepare-servers]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        server: ${{ fromJson(needs.prepare-servers.outputs.servers) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ matrix.server }} >> ~/.ssh/known_hosts

      - name: Check server connectivity
        run: |
          ssh -o ConnectTimeout=10 root@${{ matrix.server }} "echo 'Server ${{ matrix.server }} connection successful'"
      
      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.yral.com
          method: jwt
          role: hot-or-not-web-leptos-ssr-role
          jwtGithubAudience: "https://github.com/dolr-ai"
          secrets: |
            secret/data/hot-or-not-web-leptos-ssr/CLOUDFLARE_STREAM_IMAGES_ANALYTICS_READ_WRITE_SECRET value | CF_TOKEN ;
            secret/data/hot-or-not-web-leptos-ssr/YRAL_DAPP_BACKEND_APP_ADMIN_AND_PROPOSAL_SUBMITTER_IDENTITY_PRIVATE_KEY value | BACKEND_ADMIN_IDENTITY ;
            secret/data/hot-or-not-web-leptos-ssr/AUTH_SESSION_COOKIE_SIGNING_SECRET_KEY value | COOKIE_KEY ;
            secret/data/hot-or-not-web-leptos-ssr/OFF_CHAIN_AGENT_GRPC_AUTH_TOKEN value | GRPC_AUTH_TOKEN ;
            secret/data/hot-or-not-web-leptos-ssr/HOT_OR_NOT_FEED_INTELLIGENCE_FIREBASE_PROJECT_EVENTS_BQ_SERVICE_ACCOUNT_JSON_FOR_WEB_LEPTOS_SSR_APP value | HON_GOOGLE_SERVICE_ACCOUNT ;
            secret/data/hot-or-not-web-leptos-ssr/QSTASH_TOKEN value | QSTASH_TOKEN ;
            secret/data/hot-or-not-web-leptos-ssr/GOOGLE_ANALYTICS_MEASUREMENT_PROTOCOL_API_SECRET value | GA4_API_SECRET ;
            secret/data/hot-or-not-web-leptos-ssr/TOKEN_TO_SIGN_OUTGOING_CALLS_TO_NSFW_DETECT_SERVICE value | NSFW_GRPC_TOKEN ;
            secret/data/hot-or-not-web-leptos-ssr/HOT_OR_NOT_ALLOYDB_INSTANCE value | ALLOYDB_INSTANCE ;
            secret/data/hot-or-not-web-leptos-ssr/HOT_OR_NOT_ALLOYDB_DB_PASSWORD value | ALLOYDB_DB_PASSWORD ;
            secret/data/hot-or-not-web-leptos-ssr/HOT_OR_NOT_ALLOYDB_SERVICE_ACCOUNT value | ALLOYDB_SERVICE_ACCOUNT_JSON ;
            secret/data/hot-or-not-web-leptos-ssr/HOT_OR_NOT_WORKER_JWT value | HON_WORKER_JWT ;
            secret/data/hot-or-not-web-leptos-ssr/YRAL_AUTH_V2_SECRET_KEY value | YRAL_AUTH_CLIENT_SECRET ;
            secret/data/hot-or-not-web-leptos-ssr/STDB_ADMIN_ACCESS_TOKEN value | STDB_ADMIN_ACCESS_TOKEN ;
            secret/data/hot-or-not-web-leptos-ssr/ANALYTICS_SERVER_TOKEN value | ANALYTICS_SERVER_TOKEN ;
            secret/data/hot-or-not-web-leptos-ssr/AUTH_JWT_ES256_SIGNING_SECRET_KEY_PEM value | YRAL_AUTH_MIGRATION_ES256_PEM ;
            secret/data/hot-or-not-web-leptos-ssr/YRAL_METADATA_NOTIFICATION_API_KEY value | YRAL_METADATA_NOTIFICATION_API_KEY ;
            secret/data/hot-or-not-web-leptos-ssr/OTLP_ENDPOINT value | OTLP_ENDPOINT ;
            secret/data/DRAGONFLY_CLUSTER_1_PASSWORD value | DRAGONFLY_PASSWORD ;
            secret/data/DRAGONFLY_CLUSTER_1_HOSTS value | DRAGONFLY_HOSTS ;
            secret/data/DRAGONFLY_CLUSTER_1_CA_CERT value | DRAGONFLY_CA_CERT ;
            secret/data/DRAGONFLY_CLUSTER_1_CLIENT_CERT value | DRAGONFLY_CLIENT_CERT ;
            secret/data/DRAGONFLY_CLUSTER_1_CLIENT_KEY value | DRAGONFLY_CLIENT_KEY ;

      - name: Sync deployment files to server
        run: |
          rsync -avz --delete \
            ./deploy-baremetal/ \
            root@${{ matrix.server }}:/home/yral-frontend/

      - name: Log in to GHCR on server
        run: |
          ssh root@${{ matrix.server }} "
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          "

      - name: Deploy with Docker Compose
        env:
          HON_GOOGLE_SERVICE_ACCOUNT: ${{ env.HON_GOOGLE_SERVICE_ACCOUNT }}
          ALLOYDB_SERVICE_ACCOUNT_JSON: ${{ env.ALLOYDB_SERVICE_ACCOUNT_JSON }}
        run: |
          # Shell-escape JSON secrets
          ALLOYDB_SA_JSON_ESCAPED=$(printf '%q' "$ALLOYDB_SERVICE_ACCOUNT_JSON")
          HON_GOOGLE_SA_ESCAPED=$(printf '%q' "$HON_GOOGLE_SERVICE_ACCOUNT")
          
          ssh root@${{ matrix.server }} "
            cd /home/yral-frontend

            echo 'Pulling latest images...'
            APP_IMAGE=ghcr.io/${{ github.repository }} \
            IMAGE_TAG=${{ github.sha }} \
            docker compose pull

            echo 'Stopping existing containers...'
            docker compose down --remove-orphans || true

            echo 'Starting services...'
            APP_IMAGE=ghcr.io/${{ github.repository }} \
            IMAGE_TAG=${{ github.sha }} \
            CF_TOKEN='${{ env.CF_TOKEN }}' \
            BACKEND_ADMIN_IDENTITY='${{ env.BACKEND_ADMIN_IDENTITY }}' \
            COOKIE_KEY='${{ env.COOKIE_KEY }}' \
            GRPC_AUTH_TOKEN='${{ env.GRPC_AUTH_TOKEN }}' \
            HON_GOOGLE_SERVICE_ACCOUNT=$HON_GOOGLE_SA_ESCAPED \
            QSTASH_TOKEN='${{ env.QSTASH_TOKEN }}' \
            GA4_API_SECRET='${{ env.GA4_API_SECRET }}' \
            NSFW_GRPC_TOKEN='${{ env.NSFW_GRPC_TOKEN }}' \
            ALLOYDB_INSTANCE='${{ env.ALLOYDB_INSTANCE }}' \
            ALLOYDB_DB_PASSWORD='${{ env.ALLOYDB_DB_PASSWORD }}' \
            ALLOYDB_SERVICE_ACCOUNT_JSON=$ALLOYDB_SA_JSON_ESCAPED \
            HON_WORKER_JWT='${{ env.HON_WORKER_JWT }}' \
            ANALYTICS_SERVER_TOKEN='${{ env.ANALYTICS_SERVER_TOKEN }}' \
            YRAL_AUTH_CLIENT_SECRET='${{ env.YRAL_AUTH_CLIENT_SECRET }}' \
            YRAL_AUTH_MIGRATION_ES256_PEM='${{ env.YRAL_AUTH_MIGRATION_ES256_PEM }}' \
            YRAL_METADATA_NOTIFICATION_API_KEY='${{ env.YRAL_METADATA_NOTIFICATION_API_KEY }}' \
            STDB_ADMIN_ACCESS_TOKEN='${{ env.STDB_ADMIN_ACCESS_TOKEN }}' \
            OTLP_ENDPOINT='${{ env.OTLP_ENDPOINT }}' \
            DRAGONFLY_PASSWORD='${{ env.DRAGONFLY_PASSWORD }}' \
            DRAGONFLY_HOSTS='${{ env.DRAGONFLY_HOSTS }}' \
            DRAGONFLY_CA_CERT='${{ env.DRAGONFLY_CA_CERT }}' \
            DRAGONFLY_CLIENT_CERT='${{ env.DRAGONFLY_CLIENT_CERT }}' \
            DRAGONFLY_CLIENT_KEY='${{ env.DRAGONFLY_CLIENT_KEY }}' \
            docker compose up -d

            echo 'Waiting for services to start...'
            sleep 15

            echo 'Services status:'
            docker compose ps
          "

      - name: Verify deployment
        run: |
          ssh root@${{ matrix.server }} "
            cd /home/yral-frontend
            echo '=== Container Status ==='
            docker compose ps

            echo ''
            echo '=== Frontend Logs (last 20 lines) ==='
            docker compose logs --tail=20 yral-frontend 2>/dev/null || echo 'Logs not yet available'
          "

      - name: Health check
        run: |
          echo 'Waiting for health check...'
          sleep 10
          ssh root@${{ matrix.server }} "
            curl -f http://localhost:80/health || echo 'Health check endpoint not ready'
          "

  deployment-summary:
    name: Deployment Summary
    needs: [deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Deployment summary
        run: |
          echo "## Bare Metal Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Status: ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/${{ github.repository }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services" >> $GITHUB_STEP_SUMMARY
          echo "- yral-frontend (Leptos SSR on port 8080)" >> $GITHUB_STEP_SUMMARY
          echo "- caddy (TLS termination + reverse proxy)" >> $GITHUB_STEP_SUMMARY

  e2e-tests:
    needs: deploy
    uses: ./.github/workflows/e2e-tests.yml
    secrets: inherit
    with:
      preview_url: https://yral.com
      build_name: main-commit-${{github.sha}}-attempt-${{github.run_attempt}}
