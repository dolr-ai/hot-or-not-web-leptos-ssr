name: Build and Check linting for prod release

on:
  workflow_call:
    inputs:
      publish-artifact:
        default: false
        required: false
        type: boolean
  workflow_dispatch:

jobs:
  build_check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 32

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # devcontainer.json bind-mounts ~/.ssh/agent.sock from the host so
      # developers can forward their SSH agent into the container. In CI
      # there is no SSH agent socket, so create a placeholder file to
      # prevent Docker from failing on the missing bind-mount source.
      - name: Create SSH agent socket placeholder
        run: mkdir -p ~/.ssh && touch ~/.ssh/agent.sock

      # devcontainer.json bind-mounts ~/.config/gh so the gh CLI config is
      # available inside the container. GitHub-hosted runners don't pre-create
      # this directory, so Docker refuses to start with a "bind source path
      # does not exist" error. Create an empty directory as a placeholder.
      - name: Create gh config placeholder
        run: mkdir -p ~/.config/gh

      - name: Run build check in devcontainer
        uses: devcontainers/ci@v0.3
        env:
          LEPTOS_BIN_TARGET_TRIPLE: x86_64-unknown-linux-musl
          LEPTOS_HASH_FILES: "true"
          LEPTOS_TAILWIND_VERSION: v4.1.7
        with:
          imageName: ghcr.io/${{ github.repository }}/devcontainer
          cacheFrom: ghcr.io/${{ github.repository }}/devcontainer
          push: filter
          refFilterForPush: refs/heads/main
          env: |
            LEPTOS_BIN_TARGET_TRIPLE
            LEPTOS_HASH_FILES
            LEPTOS_TAILWIND_VERSION
          runCmd: |
            pnpm install
            cargo fmt --check
            cargo clippy --no-deps --all-features --release -- -Dwarnings
            cargo leptos build --release --lib-features release-lib --bin-features release-bin
            objcopy --only-keep-debug target/x86_64-unknown-linux-musl/prod-release/hot-or-not-web-leptos-ssr target/x86_64-unknown-linux-musl/prod-release/hot-or-not-web-leptos-ssr.d
            objcopy --strip-debug --strip-unneeded target/x86_64-unknown-linux-musl/prod-release/hot-or-not-web-leptos-ssr
            objcopy --add-gnu-debuglink=target/x86_64-unknown-linux-musl/prod-release/hot-or-not-web-leptos-ssr.d target/x86_64-unknown-linux-musl/prod-release/hot-or-not-web-leptos-ssr
            touch .empty

      - name: Setup Sentry CLI
        uses: matbour/setup-sentry-cli@v2
        if: ${{ inputs.publish-artifact }}
        with:
          url: https://apm.yral.com
          token: ${{ secrets.SENTRY_AUTH_TOKEN }}
          organization: sentry
          project: leptos-ssr-server

      - name: Upload sentry Rust source context
        if: ${{ inputs.publish-artifact }}
        shell: bash
        run: |
          sentry-cli debug-files upload --org sentry --project leptos-ssr-server --auth-token $SENTRY_AUTH_TOKEN --include-sources .
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        continue-on-error: true

      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        if: ${{ inputs.publish-artifact }}
        with:
          name: build-musl
          path: |
            target/x86_64-unknown-linux-musl/prod-release/hot-or-not-web-leptos-ssr
            target/x86_64-unknown-linux-musl/prod-release/hash.txt
            target/site
            .empty

      - name: Find and display hash file
        run: find . -name "hash.txt" -type f

      - name: Clean up build artifacts
        if: always()
        run: |
          rm -rf target/x86_64-unknown-linux-musl/prod-release/deps || true
          rm -rf target/x86_64-unknown-linux-musl/prod-release/build || true
          rm -rf target/x86_64-unknown-linux-musl/prod-release/incremental || true
          rm -rf target/wasm32-unknown-unknown || true
          echo "Disk space after cleanup:"
          df -h /
