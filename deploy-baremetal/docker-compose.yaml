services:
  yral-frontend:
    image: ${APP_IMAGE:-ghcr.io/dolr-ai/hot-or-not-web-leptos-ssr}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      # === Leptos Configuration ===
      LEPTOS_SITE_ROOT: "site"
      LEPTOS_ENV: "production"
      LEPTOS_SITE_ADDR: "0.0.0.0:8080"
      LEPTOS_HASH_FILES: "true"

      # === Cloudflare Configuration ===
      CF_TOKEN: ${CF_TOKEN}
      CF_ACCOUNT_ID: "a209c523d2d9646cc56227dbe6ce3ede"

      # === Auth Configuration ===
      BACKEND_ADMIN_IDENTITY: ${BACKEND_ADMIN_IDENTITY}
      COOKIE_KEY: ${COOKIE_KEY}
      YRAL_AUTH_REDIRECT_URL: ${YRAL_AUTH_REDIRECT_URL:-https://legacy.yral.com/auth/google_redirect}
      YRAL_AUTH_CLIENT_ID: "4ec00561-91bb-4e60-9743-8bed684145ba"
      YRAL_AUTH_CLIENT_SECRET: ${YRAL_AUTH_CLIENT_SECRET}
      YRAL_AUTH_MIGRATION_ES256_PEM: ${YRAL_AUTH_MIGRATION_ES256_PEM}

      # === Redis Configuration for Dragonfly ===
      DRAGONFLY_PASSWORD: ${DRAGONFLY_PASSWORD}
      DRAGONFLY_HOSTS: ${DRAGONFLY_HOSTS}
      DRAGONFLY_CA_CERT: ${DRAGONFLY_CA_CERT}
      DRAGONFLY_CLIENT_CERT: ${DRAGONFLY_CLIENT_CERT}
      DRAGONFLY_CLIENT_KEY: ${DRAGONFLY_CLIENT_KEY}

      # === gRPC & External Services ===
      GRPC_AUTH_TOKEN: ${GRPC_AUTH_TOKEN}
      HON_GOOGLE_SERVICE_ACCOUNT: ${HON_GOOGLE_SERVICE_ACCOUNT}
      QSTASH_TOKEN: ${QSTASH_TOKEN}
      GA4_API_SECRET: ${GA4_API_SECRET}
      NSFW_GRPC_TOKEN: ${NSFW_GRPC_TOKEN}
      HON_WORKER_JWT: ${HON_WORKER_JWT}
      ANALYTICS_SERVER_TOKEN: ${ANALYTICS_SERVER_TOKEN}
      YRAL_METADATA_NOTIFICATION_API_KEY: ${YRAL_METADATA_NOTIFICATION_API_KEY}

      # === Observability ===
      SENTRY_ENVIRONMENT: "production"
      OTLP_ENDPOINT: ${OTLP_ENDPOINT}
    networks:
      - frontend-net

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3 QUIC support
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontend-net
    depends_on:
      - yral-frontend

networks:
  frontend-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
